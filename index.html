<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おはなしノート</title>
    <style>
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif;
            background-color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .status {
            font-weight: bold;
            color: #ff4500;
            height: 30px;
            margin-bottom: 15px;
        }
        textarea {
            width: 100%;
            height: 250px;
            font-size: 20px;
            line-height: 1.5;
            padding: 15px;
            box-sizing: border-box;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            resize: vertical;
            margin-bottom: 20px;
            background-color: #fafafa;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }
        #startBtn { background-color: #ffb6c1; color: #333; grid-column: span 2; padding: 20px; font-size: 24px; }
        #stopBtn { background-color: #d3d3d3; color: #333; grid-column: span 2; padding: 20px; font-size: 24px; display: none; }
        #copyBtn { background-color: #87cefa; color: #333; }
        #clearBtn { background-color: #ffddca; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗣️ おはなしノート</h1>
        <div class="status" id="statusText">マイクのボタンをおしてね</div>
        
        <textarea id="resultText" placeholder="ここにはなしたことばがでるよ"></textarea>
        
        <div class="button-group">
            <button id="startBtn">🎤 はなす</button>
            <button id="stopBtn">⏹️ とめる</button>
            <button id="copyBtn">📋 コピー</button>
            <button id="clearBtn">🗑️ けす</button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultText = document.getElementById('resultText');
        const statusText = document.getElementById('statusText');

        // ブラウザの音声認識機能（Web Speech API）を呼び出す
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            statusText.innerText = "⚠️ このブラウザではつかえません。Chromeをつかってね。";
            startBtn.disabled = true;
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true; // 話している途中の言葉も表示する
            recognition.continuous = true;     // 続けて認識する

            let finalTranscript = '';

            recognition.onstart = () => {
                statusText.innerText = "🔴 ろくおんちゅう... はなしてね";
                startBtn.style.display = 'none';
                stopBtn.style.display = 'block';
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + '。';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                resultText.value = finalTranscript + interimTranscript;
            };

            recognition.onerror = (event) => {
                console.error(event.error);
                statusText.innerText = "⚠️ エラーがおきました。もういちどやりなおしてね。";
                resetButtons();
            };

            recognition.onend = () => {
                statusText.innerText = "マイクのボタンをおしてね";
                resetButtons();
            };

            startBtn.addEventListener('click', () => {
                recognition.start();
            });

            stopBtn.addEventListener('click', () => {
                recognition.stop();
            });

            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(resultText.value).then(() => {
                    statusText.innerText = "✨ コピーしました！AIにはりつけてね";
                    setTimeout(() => statusText.innerText = "マイクのボタンをおしてね", 3000);
                });
            });

            clearBtn.addEventListener('click', () => {
                if(confirm("ほんとうに ぜんぶけしますか？")) {
                    finalTranscript = '';
                    resultText.value = '';
                    statusText.innerText = "✨ ぜんぶけしました";
                    setTimeout(() => statusText.innerText = "マイクのボタンをおしてね", 2000);
                }
            });

            function resetButtons() {
                startBtn.style.display = 'block';
                stopBtn.style.display = 'none';
            }
        }
    </script>
</body>
</html>
